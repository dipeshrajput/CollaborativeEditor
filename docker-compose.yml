version: "3.8"

services:

  backend:
    build: .
    ports:
      -  "8080:8080"
    depends_on:
      - postgres
      - redis
    environment: 
      - DB_HOST=postgres
      - REDIS_HOST=redis

  postgres:
    image: postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: abc123
      POSTGRES_DB: collab_editor
    volumes:
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql

  redis:
    image: redis
    ports:
      - "6379:6379"